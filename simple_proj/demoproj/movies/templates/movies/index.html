<h1>Newest Movies</h1>
<h1>Newest Movies - CI/CD Test - checking</h1>
<h1>Eureka</h1>
{% if newest_movies %}
    <ul>
    {% for movie in newest_movies %}
        <li><a href="{% url 'movies:show' movie.id %}">{{ movie.title }}</a></li>
    {% endfor %}
    </ul>
{% else %}
    <p>There are no movies recorded.</p>
{% endif %}
